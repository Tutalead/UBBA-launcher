name: release

# Publish a Windows build to GitHub Releases whenever a `v*` tag is pushed.
# The tag's numeric portion must match `version` in package.json.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write  # required for Sigstore OIDC signing

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build & publish (electron-builder)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run publish

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign installer with Sigstore
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          $installer = Get-ChildItem dist -Filter "*.exe" | Select-Object -First 1 -ExpandProperty FullName
          cosign sign-blob $installer `
            --output-signature dist\installer.sig `
            --output-certificate dist\installer.pem `
            --yes
          echo "Signed: $installer"

      - name: Upload signature to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release upload $tag dist\installer.sig dist\installer.pem --clobber
